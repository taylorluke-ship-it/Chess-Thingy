<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Production Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        #container {
            width: 90%;
            max-width: 900px;
        }

        #gameMenu {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: none;
        }

        #gameMenu h1 {
            margin-bottom: 30px;
            font-size: 48px;
        }

        #gameMenu p {
            margin-bottom: 20px;
            font-size: 18px;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        #difficulty {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        #gameboard {
            display: none;
            text-align: center;
        }

        #boardContainer {
            margin-bottom: 20px;
        }

        canvas {
            border: 4px solid #fff;
            border-radius: 8px;
            background: #b58863;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            max-width: 100%;
            height: auto;
        }

        #status {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 24px;
        }

        .game-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            #gameMenu {
                padding: 20px;
            }

            #gameMenu h1 {
                font-size: 32px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Game Menu -->
        <div id="gameMenu">
            <h1>♟️ Chess</h1>
            <p>Play against an AI opponent or challenge a friend</p>

            <div class="button-group">
                <select id="difficulty">
                    <option value="EASY">Easy</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HARD">Hard</option>
                </select>
                <button class="btn-primary" onclick="createGame()">Play vs AI</button>
                <button class="btn-secondary" onclick="playWithoutAI()">Local Game</button>
            </div>
        </div>

        <!-- Game Board -->
        <div id="gameboard">
            <div id="status">Connecting...</div>

            <div id="boardContainer">
                <canvas id="chessBoard" width="640" height="640"></canvas>
            </div>

            <div class="game-info">
                <div class="info-box">Mode: <span id="modeInfo">-</span></div>
                <div class="info-box">Status: <span id="gameStatus">-</span></div>
            </div>

            <div class="controls">
                <button class="btn-secondary" onclick="location.reload()">New Game</button>
            </div>
        </div>
    </div>

    <script src="customer.js"></script>
</body>
</html>
